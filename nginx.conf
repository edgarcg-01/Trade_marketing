server {
    listen $PORT;
    server_name localhost;
    # pid/access/error logs redirigidos para que nginx corra como user non-root.
    # En Dockerfile asignamos /var/cache/nginx y /tmp con permisos del user.
    # HTTP/2 lo termina Railway en su edge router — el container sirve http/1.1
    # contra el edge, suficiente porque el cuello en 4G lenta es el wire.

    root /usr/share/nginx/html;
    index index.html;

    # Subida de fotos (ticket OCR, capturas): el default de nginx es 1 MB y
    # las fotos de celular pesan 2-5 MB → 413 antes de llegar al API. 12 MB
    # deja margen sobre el límite de multer (10 MB); el service corta a 8 MB
    # con mensaje claro.
    client_max_body_size 12m;

    # ── Compresión gzip ─────────────────────────────────────────────────────
    # Sin esto el cold-start en 4G lenta bajaba 4MB. Con gzip level 6 sobre
    # JS/CSS/JSON/HTML el wire cae ~70-80%. Trade-off CPU mínimo en el server
    # (level 6 es el sweet spot; >6 da retornos marginales con CPU caro).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Headers de seguridad globales ───────────────────────────────────────
    # Helmet ya los pone para /api/* (responses del NestJS), pero el SPA
    # estático servido por nginx también los necesita.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    # HSTS: forzar HTTPS por 1 año (Railway sirve por HTTPS por default).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Server header — minimizar leak de versión
    server_tokens off;

    # ── SW + manifest: NO cachear (PRIMERO, antes del long-cache de .js) ────
    # nginx evalúa `location ~*` en orden de aparición, primer match gana.
    # `ngsw-worker.js` matchea también el patrón de assets hashed de abajo —
    # si éste bloque va segundo, se cachearía 1 año el SW y el cliente nunca
    # descubre nuevos deploys.
    location ~* (ngsw-worker\.js|ngsw\.json|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires off;
        access_log off;
    }

    # ── Cache de assets hashed (long-lived) ─────────────────────────────────
    # Angular CLI genera `main-XXXXX.js`, `polyfills-XXXXX.js`, etc., con un
    # hash en el filename. Cuando cambia el código, cambia el hash → safe
    # cachear forever. Esto recorta el grueso de los 4MB del cold-start (los
    # 4,124 KiB de "efficient caching" en Lighthouse).
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Repetimos los headers de seguridad porque `add_header` no hereda
        # cuando un location define los suyos (regla de nginx).
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        access_log off;
        try_files $uri =404;
    }

    location / {
        # index.html SIEMPRE fresh — sino el cliente no descubre nuevos hashes
        # cuando deployamos. El resto del long-cache vive en los assets.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP del documento HTML. add_header NO se hereda en un location con sus
        # propios add_header → re-declaramos todo. Mapas (Leaflet OSM + Mapbox
        # static) en img-src; `script-src 'unsafe-inline'` por el onload inline de
        # fuentes en index.html. Helmet cubre /api/* aparte.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://api.mapbox.com https://*.tile.openstreetmap.org; connect-src 'self' https://api.mapbox.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para la API NestJS
    location /api/ {
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para WebSocket Socket.IO (namespace /reports)
    location /reports/socket.io/ {
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
