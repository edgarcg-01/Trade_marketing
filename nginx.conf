server {
    listen $PORT;
    server_name localhost;
    # pid/access/error logs redirigidos para que nginx corra como user non-root.
    # En Dockerfile asignamos /var/cache/nginx y /tmp con permisos del user.

    root /usr/share/nginx/html;
    index index.html;

    # Subida de fotos (ticket OCR, capturas): el default de nginx es 1 MB y
    # las fotos de celular pesan 2-5 MB → 413 antes de llegar al API. 12 MB
    # deja margen sobre el límite de multer (10 MB); el service corta a 8 MB
    # con mensaje claro.
    client_max_body_size 12m;

    # ── Headers de seguridad globales ───────────────────────────────────────
    # Helmet ya los pone para /api/* (responses del NestJS), pero el SPA
    # estático servido por nginx también los necesita.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    # HSTS: forzar HTTPS por 1 año (Railway sirve por HTTPS por default).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Server header — minimizar leak de versión
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear cache para Service Worker y Manifest para asegurar actualizaciones
    location ~* (ngsw-worker\.js|ngsw\.json|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        access_log off;
    }

    # Proxy para la API NestJS
    location /api/ {
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para WebSocket Socket.IO (namespace /reports)
    location /reports/socket.io/ {
        proxy_pass http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
