version: '3.8'

services:
  trade-marketing-api:
    image: edgarcg01/trade-marketing-api:latest
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:5432/trade_marketing
      - NODE_ENV=production
    restart: always

  trade-marketing-view:
    image: edgarcg01/trade-marketing-view:latest
    ports:
      - "82:80"
    restart: always

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: always
