name: Deploy Trade Marketing to GHCR

on:
  push:
    branches:
      - main
    paths:
      - 'apps/trade-marketing-api/**'
      - 'apps/trade-marketing-view/**'
      - 'libs/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'tsconfig.*'
      - 'nx.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Trade Marketing API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/edgarcg-01/megadulces-trade-marketing/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Trade Marketing View Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.view
          push: true
          tags: ${{ env.REGISTRY }}/edgarcg-01/megadulces-trade-marketing/view:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
