<div class="min-h-screen w-full bg-surface-layout text-content-main font-sans transition-colors duration-300" [class.theme-monochrome]="themeService.isMonochrome()">

  <!-- Background Typography Layer - Changes with Theme -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-10 select-none hidden sm:block">
    <h2 class="text-[20vw] sm:text-[25vw] font-black tracking-tighter leading-none whitespace-nowrap absolute -top-12 -left-12 text-content-main transition-colors duration-300">
      MEGA
    </h2>
    <h2 class="text-[20vw] sm:text-[25vw] font-black tracking-tighter leading-none whitespace-nowrap absolute -bottom-12 -right-12 text-content-main transition-colors duration-300">
      DULCES
    </h2>
  </div>

  <!-- Theme Toggle -->
  <div class="fixed top-4 sm:top-6 right-4 sm:right-6 z-20">
    <button
      (click)="toggleTheme()"
      class="flex items-center gap-2 text-content-muted hover:text-content-main transition-colors group p-2">
      <span class="text-xs uppercase tracking-widest hidden sm:inline">
        {{ themeService.isMonochrome() ? 'Modo Normal' : 'Modo B&N' }}
      </span>
      <i [ngClass]="themeService.isMonochrome() ? 'pi pi-sun' : 'pi pi-moon'" class="text-lg"></i>
    </button>
  </div>

  <!-- Main Content -->
  <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-4 sm:px-6 py-8 sm:py-12">

    <!-- Brand Section -->
    <div class="w-full max-w-md text-center mb-8 sm:mb-12">
      <!-- Logo - Mega Dulces -->
      <div class="w-36 h-36 sm:w-80 sm:h-80 mx-auto mb-6 sm:mb-8 flex items-center justify-center animate-fade-in">
        <img
      src="/assets/logos/mega-dulces-logo.png"
      alt="Mega Dulces Logo"
      class="w-full h-full object-contain">
      </div>
      <p class="text-xs sm:text-sm tracking-wider uppercase text-content-muted">
        Portal de Acceso
      </p>
    </div>

    <!-- Login Form -->
    <div class="w-full max-w-sm sm:max-w-md">
      <div class="bg-surface-card border border-divider backdrop-blur-sm p-6 sm:p-8 rounded-lg sm:rounded-xl shadow-lg">

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/30 text-red-600 dark:text-red-400 p-3 sm:p-4 rounded-lg mb-6 text-xs sm:text-sm font-medium">
          <div class="flex items-center gap-2">
            <i class="pi pi-exclamation-circle"></i>
            <span>{{ errorMessage }}</span>
          </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

          <!-- Username Input - Centered text -->
          <div class="relative group">
            <label for="username" class="text-xs uppercase tracking-wider text-content-muted block mb-2 group-focus-within:text-accent-brand transition-colors">
              Usuario
            </label>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Nombre de usuario"
              class="w-full bg-transparent border-b-2 border-divider px-0 py-2 text-sm sm:text-base font-medium text-center text-content-main focus:outline-none focus:border-accent-brand transition-colors placeholder:text-content-faint"
              [ngClass]="{'border-red-500': loginForm.get('username')?.invalid && loginForm.get('username')?.touched}">
            <p *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
               class="text-xs text-red-500 mt-1 font-medium">
              El usuario es requerido
            </p>
          </div>

          <!-- Password Input - Centered text -->
          <div class="relative group">
            <label for="password" class="text-xs uppercase tracking-wider text-content-muted block mb-2 group-focus-within:text-accent-brand transition-colors">
              Contraseña
            </label>
            <input
              id="password"
              type="password"
              formControlName="password"
              placeholder="Mínimo 6 caracteres"
              class="w-full bg-transparent border-b-2 border-divider px-0 py-2 text-sm sm:text-base font-medium text-center text-content-main focus:outline-none focus:border-accent-brand transition-colors placeholder:text-content-faint"
              [ngClass]="{'border-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
            <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               class="text-xs text-red-500 mt-1 font-medium">
              Mínimo 6 caracteres
            </p>
          </div>

          <!-- Submit Button -->
          <div class="pt-2">
            <button
              type="submit"
              [disabled]="isLoading"
              class="w-full bg-accent-brand hover:bg-yellow-500 disabled:opacity-50 disabled:cursor-not-allowed text-black font-black py-3 px-4 text-sm sm:text-base rounded-lg transition-all duration-200 uppercase tracking-tight">
              {{ isLoading ? 'Verificando...' : 'Iniciar Sesión' }}
            </button>
          </div>

        </form>

      </div>

      <!-- Footer Links -->
      <div class="mt-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs uppercase tracking-wider text-content-muted">
        <button class="hover:text-accent-brand transition-colors">
          Recuperar Acceso
        </button>
        <button class="hover:text-accent-brand transition-colors flex items-center gap-1">
          <i class="pi pi-question text-xs"></i>
          Soporte
        </button>
      </div>
    </div>

  </div>

</div>
