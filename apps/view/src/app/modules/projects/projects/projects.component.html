<div class="min-h-[100dvh] bg-surface-layout">

  <!--
    Top Bar. `safe-top` + `safe-x` para que el header pinte detrás del notch
    pero el contenido (saludo + botón logout) quede debajo de él. En landscape
    de iPhones notched, `safe-x` agrega el padding lateral del notch.
  -->
  <header class="bg-surface-card border-b border-divider px-6 py-4 safe-top safe-x">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-headline text-content-main">Plataforma Operativa</h1>
        <p class="text-label text-content-dim">Seleccione un proyecto para continuar</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <p class="text-body font-semibold text-content-main">{{ user()?.username }}</p>
          <p class="text-label text-content-muted">{{ user()?.role_name }}</p>
        </div>
        <p-button
          label="Cerrar Sesión"
          icon="pi pi-sign-out"
          severity="secondary"
          [outlined]="true"
          size="small"
          (click)="logout()">
        </p-button>
      </div>
    </div>
  </header>

  <!--
    Main content. `safe-x` evita que las cards queden tapadas por el notch
    en landscape; `safe-bottom` mantiene la última card visible sobre el
    home indicator si el grid llega al borde inferior.
  -->
  <main class="max-w-6xl mx-auto px-6 py-12 safe-x safe-bottom">

    <!-- Greeting -->
    <div class="mb-10">
      <h2 class="text-display text-content-main">
        Bienvenido, <span class="text-content-dim">{{ user()?.username }}</span>
      </h2>
      <p class="text-body text-content-dim mt-1">Estos son los proyectos asignados a tu cuenta.</p>
    </div>

    <!-- Projects Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <div
        *ngFor="let project of projects()"
        (click)="navigateTo(project.route)"
        class="group bg-surface-card rounded-xl border border-divider p-6 cursor-pointer transition-all duration-200 hover:border-content-muted hover:shadow-lg">

        <!-- Card Header -->
        <div class="flex items-start justify-between mb-4">
          <div class="h-10 w-10 rounded-lg bg-surface-ground group-hover:bg-content-main flex items-center justify-center transition-colors">
            <i [ngClass]="project.icon" class="text-content-main group-hover:text-surface-card text-lg transition-colors"></i>
          </div>
          <span class="inline-flex items-center rounded-full border border-divider bg-surface-ground px-2.5 py-0.5 text-label text-content-main">
            {{ project.status }}
          </span>
        </div>

        <!-- Card Body -->
        <h3 class="text-title text-content-main group-hover:underline underline-offset-4 mb-2">
          {{ project.name }}
        </h3>
        <p class="text-body text-content-dim leading-relaxed">
          {{ project.description }}
        </p>

        <!-- Card Footer -->
        <div class="mt-6 flex items-center text-body font-medium text-content-main">
          Acceder
          <i class="pi pi-arrow-right ml-2 text-xs transition-transform group-hover:translate-x-1"></i>
        </div>

      </div>

    </div>

  </main>

</div>
