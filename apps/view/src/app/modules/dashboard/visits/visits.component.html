<div class="p-6 space-y-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-content-main flex items-center gap-3"><i class="pi pi-map-marker text-content-main"></i> Detalle de Visitas (Rutas)</h1>
      <p class="text-sm text-content-dim">Consulta de cobertura operativa e historial logístico por zona.</p>
    </div>
    <div class="flex gap-2">
      <p-button label="Filtrar" icon="pi pi-filter" severity="secondary" [outlined]="true"></p-button>
    </div>
  </div>

  <div class="bg-surface-card border border-surface-border rounded-xl shadow-sm p-12 text-center text-content-muted">
    <div class="w-16 h-16 rounded-full bg-surface-ground border border-surface-border flex items-center justify-center mx-auto mb-4 text-blue-500">
      <i class="pi pi-map-marker text-2xl"></i>
    </div>
    <h3 class="font-bold text-lg text-content-main mb-2">Monitoreo Satelital Próximamente</h3>
    <p class="text-sm mb-4">El despliegue de visitas en tiempo real con geolocalización está en configuración.</p>
    <div class="flex justify-center gap-2 text-xs text-content-dim">
      <span class="px-2 py-1 bg-surface-ground rounded">🛰️ GPS Tracking</span>
      <span class="px-2 py-1 bg-surface-ground rounded">📍 Rutas Optimizadas</span>
      <span class="px-2 py-1 bg-surface-ground rounded">⏱️ Tiempo Real</span>
    </div>
  </div>
</div>
