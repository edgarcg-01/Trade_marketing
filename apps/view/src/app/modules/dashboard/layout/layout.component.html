
<div
  class="flex min-h-screen min-h-[100dvh] bg-surface-layout overflow-hidden transition-colors duration-300"
  [class.theme-monochrome]="themeService.isMonochrome()"
>
  <!-- Mobile Overlay -->
  <div
    *ngIf="sidebarOpen() && isMobile()"
    class="fixed inset-0 bg-black/50 z-40 lg:hidden"
    (click)="closeSidebar()"
  ></div>

  <!-- Sidebar -->
  <aside
    class="fixed lg:static inset-y-0 left-0 z-50 flex flex-col bg-surface-sidebar border-r border-divider shrink-0 shadow-xl lg:shadow-none h-screen overflow-hidden"
    [ngClass]="{
      'w-64': sidebarOpen(),
      'w-16': sidebarCollapsed() && !isMobile(),
      '-translate-x-full': !sidebarOpen() && isMobile(),
      'translate-x-0': sidebarOpen() && isMobile(),
    }"
    style="transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s ease"
  >
    <!-- Header -->
    <div class="flex items-center justify-between px-4 h-14 border-b border-divider shrink-0">
      <div class="flex items-center gap-2 overflow-hidden" *ngIf="!sidebarCollapsed() || isMobile()" style="transition: opacity 0.2s ease 0.1s">
        <img
          src="assets/logos/mega-dulces-logo.webp"
          alt="Logo"
          class="w-6 h-6 object-contain transition-transform duration-300 hover:scale-110 flex-shrink-0"
        >
        <span class="text-sm font-bold text-content-main truncate transition-opacity duration-200">Trade Marketing</span>
      </div>
      <div class="flex items-center gap-2">
        <button
          *ngIf="isMobile()"
          (click)="closeSidebar()"
          class="p-1.5 rounded-full hover:bg-surface-hover transition-colors text-content-muted lg:hidden"
        >
          <i class="pi pi-times text-sm"></i>
        </button>
        <button
          *ngIf="!isMobile()"
          (click)="toggleSidebar()"
          class="p-1.5 rounded-full hover:bg-surface-hover transition-colors text-content-muted"
        >
          <i
            [ngClass]="
              sidebarCollapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'
            "
            class="text-sm"
          ></i>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto min-h-0 py-4">
      <!-- Main Nav -->
      <div class="px-3">
        <p
          *ngIf="!sidebarCollapsed() || isMobile() || sidebarOpen() "
          class="text-[10px] font-semibold uppercase tracking-widest text-content-faint mb-2 px-2"
        >
          Operaciones
        </p>
        <ul class="space-y-1">
          <li *ngFor="let item of navItems()">
            <button
              (click)="navigateTo(item.route)"
              class="flex items-center w-full px-2 py-2 rounded-xl text-sm font-medium transition-all duration-200 relative group"
              [ngClass]="
                isActive(item.route)
                  ? 'bg-surface-active text-content-active rounded-xl'
                  : 'text-content-muted hover:bg-surface-hover hover:text-content-main'
              "
              [title]="item.label"
            >
              <!-- Indicador activo sutil -->
              <span
                *ngIf="isActive(item.route)"
                class="absolute left-0 w-1 h-6 rounded-r bg-content-muted/50"
              ></span>
              <i
                [ngClass]="item.icon"
                class="shrink-0 w-8 text-center text-sm transition-all duration-200 group-hover:scale-110"
              ></i>
              <span
                *ngIf="!sidebarCollapsed() || isMobile()"
                class="ml-1 truncate flex-1 text-left transition-all duration-200"
                [class.opacity-0]="sidebarCollapsed() && !isMobile()"
                [class.w-0]="sidebarCollapsed() && !isMobile()"
              >
                {{ item.label }}
              </span>
            </button>
          </li>
        </ul>
      </div>

      <!-- Admin Nav -->
      <div class="px-3 mt-4">
        <p
          *ngIf="!sidebarCollapsed() || isMobile() || sidebarOpen()"
          class="text-[10px] font-semibold uppercase tracking-widest text-content-faint mb-2 px-2"
        >
          Administración
        </p>
        <ul class="space-y-1">
          <li *ngFor="let item of adminItems()">
            <button
              (click)="navigateTo(item.route)"
              class="flex items-center w-full px-2 py-2 rounded-xl text-sm font-medium transition-all duration-200 relative group"
              [ngClass]="
                isActive(item.route)
                  ? 'bg-surface-active text-content-active rounded-xl'
                  : 'text-content-muted hover:bg-surface-hover hover:text-content-main'
              "
              [title]="item.label"
            >
              <!-- Indicador activo sutil -->
              <span
                *ngIf="isActive(item.route)"
                class="absolute left-0 w-1 h-6 rounded-r bg-content-muted/50"
              ></span>
              <i
                [ngClass]="item.icon"
                class="shrink-0 w-8 text-center text-sm transition-all duration-200 group-hover:scale-110"
              ></i>
              <span
                *ngIf="!sidebarCollapsed() || isMobile()"
                class="ml-1 truncate flex-1 text-left transition-all duration-200"
                [class.opacity-0]="sidebarCollapsed() && !isMobile()"
                [class.w-0]="sidebarCollapsed() && !isMobile()"
              >
                {{ item.label }}
              </span>
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Footer -->
    <div class="border-t border-divider p-3 space-y-1 shrink-0 bg-surface-sidebar">
      <button
        (click)="goToProjects()"
        class="flex items-center w-full px-2 py-2 rounded-xl text-sm font-medium text-content-muted hover:bg-surface-hover hover:text-content-main transition-colors"
        title="Cambiar proyecto"
      >
        <i
          class="pi pi-arrow-right-arrow-left shrink-0 w-8 text-center text-sm"
        ></i>
        <span *ngIf="!sidebarCollapsed() || isMobile()" class="ml-1 truncate">Proyectos</span>
      </button>

      <!-- Theme Toggle -->
      <button
        (click)="themeService.toggleMonochrome()"
        class="flex items-center w-full px-2 py-2 rounded-xl text-sm font-medium transition-colors"
        [ngClass]="
          themeService.isMonochrome()
            ? 'bg-surface-active text-content-active'
            : 'text-content-muted hover:bg-surface-hover hover:text-content-main'
        "
        [title]="themeService.isMonochrome() ? 'Modo Normal' : 'Modo B&N'"
      >
        <i
          [ngClass]="themeService.isMonochrome() ? 'pi pi-sun' : 'pi pi-moon'"
          class="shrink-0 w-8 text-center text-sm"
        ></i>
        <span *ngIf="!sidebarCollapsed() || isMobile()" class="ml-1 truncate">
          {{ themeService.isMonochrome() ? 'Modo Normal' : 'Modo B&N' }}
        </span>
      </button>

      <button
        (click)="logout()"
        class="flex items-center w-full px-2 py-2 rounded-xl text-sm font-medium text-[#dc2626] hover:bg-rose-500/10 transition-colors"
        title="Cerrar sesión"
      >
        <i class="pi pi-sign-out shrink-0 w-8 text-center text-sm"></i>
        <span *ngIf="!sidebarCollapsed() || isMobile()" class="ml-1 truncate"
          >Cerrar Sesión</span
        >
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden lg:ml-0">
    <!-- Top Bar -->
    <header
      class="h-14 bg-surface-sidebar border-b border-divider flex items-center justify-between px-4 lg:px-6 shrink-0 transition-colors duration-300"
    >
      <!-- Left: Mobile Menu -->
      <div class="flex items-center gap-3">
        <button
          (click)="openSidebar()"
          class="lg:hidden p-2 rounded-lg hover:bg-surface-hover transition-colors text-content-muted"
        >
          <i class="pi pi-bars text-lg"></i>
        </button>
      </div>

      <!-- Right: User Info -->
      <div class="flex items-center gap-3">
        <!-- Loading Indicator -->
        <div
          *ngIf="loading()"
          class="flex items-center gap-2 text-xs text-content-muted mr-2"
        >
          <i class="pi pi-spin pi-spinner text-sm"></i>
          <span>Cargando...</span>
        </div>

        <!-- User Info -->
        <div class="text-right">
          <p class="text-sm font-semibold text-content-main">
            {{ user()?.username }}
          </p>
          <p class="text-xs text-content-muted uppercase tracking-wider">
            {{ user()?.role_name }} · {{ user()?.zona }}
          </p>
        </div>

        <!-- User Avatar -->
        <div
          class="h-8 w-8 rounded-full bg-surface-active text-content-active flex items-center justify-center text-xs font-bold uppercase transition-colors"
        >
          {{ user()?.username?.charAt(0) }}
        </div>
      </div>
    </header>

    <!-- Breadcrumbs -->
    <nav
      class="px-6 py-2 bg-surface-card border-b border-divider text-xs text-content-muted"
    >
      <span>Dashboard</span> <span class="mx-2">/</span>
      <span class="text-content-main font-medium">{{
        getCurrentPageTitle()
      }}</span>
    </nav>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto w-full h-full bg-surface-layout relative" #mainContainer>
      <div class="animate-fade-in-up">
        <router-outlet></router-outlet>
      </div>

      <!-- Scroll to Top Button - Monocromático sutil -->
      <button
        *ngIf="showScrollTop()"
        (click)="scrollToTop()"
        class="fixed bottom-6 right-6 z-40 w-12 h-12 rounded-full bg-surface-card border border-divider text-content-main shadow-md hover:shadow-lg hover:bg-surface-hover transition-all duration-200 flex items-center justify-center group"
      >
        <i class="pi pi-arrow-up text-lg group-hover:-translate-y-0.5 transition-transform"></i>
      </button>
    </main>
  </div>
</div>
