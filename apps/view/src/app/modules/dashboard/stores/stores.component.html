<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h2 class="text-2xl font-bold text-content-main">Directorio de Tiendas (PDV)</h2>
      <p class="text-sm text-content-dim">Gestión del catálogo maestro de Puntos de Venta.</p>
    </div>
    <div class="flex gap-2">
      <p-button label="Importar" icon="pi pi-upload" severity="secondary" [outlined]="true"></p-button>
      <p-button label="Nueva Tienda" icon="pi pi-plus"></p-button>
    </div>
  </div>

  <div class="bg-surface-card border border-surface-border rounded-xl shadow-sm p-12 text-center text-content-muted">
    <div class="w-16 h-16 rounded-full bg-surface-ground border border-surface-border flex items-center justify-center mx-auto mb-4 text-emerald-500">
      <i class="pi pi-shop text-2xl"></i>
    </div>
    <h3 class="font-bold text-lg text-content-main">Módulo en Construcción</h3>
    <p class="text-sm">La funcionalidad de administración de Puntos de Venta maestro será implementada en la siguiente fase.</p>
  </div>
</div>
