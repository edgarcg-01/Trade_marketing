server {
    listen $PORT;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    # Buffers de header grandes: el JWT (permisos + rules CASL) puede pasar el
    # default de nginx (8k) y dar 400 en todo /api. 32k deja margen.
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    # Resolver: proxy_pass con variable ($API_UPSTREAM) obliga a resolver el
    # hostname en runtime. Sin esto nginx tira 502 ("no resolver defined").
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=on;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ── Service worker: NUNCA cachear ─────────────────────────────────────────
    # `location =` (exact match) gana sobre el regex de assets de abajo. Si
    # `ngsw-worker.js` / `ngsw.json` caen en el long-cache `immutable` de abajo,
    # el navegador queda clavado en una versión vieja del SW para SIEMPRE: nunca
    # detecta deploys nuevos → el update-flow del PwaService no dispara jamás.
    # Angular espera que estos archivos se sirvan sin caché (o revalidando).
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /worker-basic.min.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ── Manifest + sello de versión: caché corta / nula ───────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/manifest+json;
        try_files $uri =404;
    }
    # Sello de versión inyectado en BUILD-TIME (ver Dockerfile). No cachear para
    # poder confirmar qué build está vivo sin pelear con la caché del browser.
    location = /assets/version.json {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }

    # ── Assets hashed (long-cache) ────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP — endurecimiento del documento HTML. `add_header` NO se hereda en un
        # location con sus propios add_header, así que re-declaramos todo acá.
        # `script-src 'unsafe-inline'` es un compromiso consciente: el index.html
        # carga las fuentes con un onload inline. Aun así la CSP bloquea scripts
        # remotos inyectados, clickjacking (frame-ancestors), object/embed y acota
        # de dónde vienen estilos/fuentes/imágenes/conexiones. Endurecer con nonces
        # cuando se quite el inline.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → servicio backend (otro Railway service) ───────────────────
    # $API_UPSTREAM se inyecta por envsubst en start.sh. Ej:
    #   https://<app-principal>.up.railway.app   (público)
    #   http://<api-service>.railway.internal:3333  (red interna Railway)
    location /api/ {
        proxy_pass $API_UPSTREAM;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        # ── Timeouts agresivos (estándar q-commerce) ──────────────────────────
        # Sin esto el default es 60s: un backend colgado = spinner de 1 min en el
        # portal. 10s conectar, 30s leer/escribir respuesta.
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ── Failover ante backend caído/lento ─────────────────────────────────
        # Reintenta el upstream ante error/timeout/5xx (máx 2 intentos en 20s).
        # NO incluye `non_idempotent`, así que los POST (crear/confirmar orden)
        # NO se reintentan → cero riesgo de órdenes duplicadas.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 20s;
    }

    # ── Proxy WebSocket (alertas /alerts usan path /reports/socket.io) ─────────
    location /reports/socket.io/ {
        proxy_pass $API_UPSTREAM;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
