<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Mega Dulces</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Gama baja: marca el documento para degradar efectos caros (blur, loops GSAP).
         deviceMemory en GiB (Chrome, bucketed, cap 8); cores = hilos lógicos. Inline y
         síncrono → la clase existe antes del primer paint (sin flash de blur). Erramos
         hacia "low-end": el estado degradado sigue siendo legible y rápido. -->
    <script>
      (function () {
        try {
          var m = navigator.deviceMemory,
            c = navigator.hardwareConcurrency;
          if ((typeof m === 'number' && m <= 4) || (typeof c === 'number' && c <= 4)) {
            document.documentElement.classList.add('low-end');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/webp" href="assets/logos/mega-dulces-logo-240.webp" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mega Dulces" />
    <!-- theme-color = color del CHROME (header/status bar), NO el de marca/acción.
         Light = --card-bg (#FFF), dark = espresso (--layout-bg). Un theme-color
         amarillo pintaba la status bar de amarillo chillón. -->
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16130F" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Portal B2B de Mega Dulces — catálogo, pedidos y promociones para tu negocio." />
    <!-- Sello de build inyectado en BUILD-TIME (ver Dockerfile). Permite confirmar
         qué commit está vivo desde DevTools sin abrir Railway. -->
    <meta name="build-commit" content="BUILD_COMMIT_PLACEHOLDER" />
    <meta name="build-ts" content="BUILD_TS_PLACEHOLDER" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" />
    </noscript>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
