server {
    listen $PORT;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12m;

    # Resolver: proxy_pass con variable ($API_UPSTREAM) obliga a resolver el
    # hostname en runtime. Sin esto nginx tira 502 ("no resolver defined").
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=on;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Headers de seguridad ──────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ── Sello de versión: NO cachear (start.sh lo reescribe en cada arranque) ──
    # `location =` exacto tiene prioridad sobre el regex de assets de abajo.
    location = /assets/version.json {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }

    # ── Service worker: NUNCA cachear ─────────────────────────────────────────
    # `location =` (exact match) gana sobre el regex de assets de abajo. Si
    # `ngsw-worker.js` / `ngsw.json` caen en el long-cache `immutable`, el
    # navegador queda clavado en una versión vieja del SW para SIEMPRE: nunca
    # detecta deploys nuevos → el update-flow del PwaService no dispara jamás.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type application/json;
        try_files $uri =404;
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /worker-basic.min.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ── Assets hashed (long-cache) ────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP — ver nota en portal. Vendor además carga mapas: imágenes estáticas de
        # Mapbox (map_image_url) y tiles OSM de Leaflet → permitidos en img-src.
        # `script-src 'unsafe-inline'` por el onload de fuentes + el <script> inline
        # del sello de build en index.html.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://api.mapbox.com https://*.tile.openstreetmap.org; connect-src 'self' https://api.mapbox.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API → servicio backend (otro Railway service) ───────────────────
    # $API_UPSTREAM se inyecta por envsubst en start.sh. Ej:
    #   https://<app-principal>.up.railway.app   (público)
    #   http://<api-service>.railway.internal:3333  (red interna Railway)
    location /api/ {
        proxy_pass $API_UPSTREAM;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Failover ante backend caído/lento. SIN `non_idempotent` → los POST
        # (crear/confirmar pedido) NO se reintentan → cero pedidos duplicados.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 20s;
    }

    # ── Proxy WebSocket (alertas /alerts usan path /reports/socket.io) ─────────
    location /reports/socket.io/ {
        proxy_pass $API_UPSTREAM;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
