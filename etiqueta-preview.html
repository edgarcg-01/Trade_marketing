<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Etiqueta preview 115×40mm — SKU 20186</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
  :root{
    --green:hsl(141,76%,16%);
    --yellow:#f6c400;
    --cream:#f8f6ea;
    --red:#F05A28;
    --font:'Baloo 2',system-ui,sans-serif;
    --font-num:'Impact','Haettenschweiler','Anton','Arial Narrow',sans-serif;
    --font-cond:'Bebas Neue','Impact','Arial Narrow',sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  @page{ size:115mm 40mm; margin:0; }
  html,body{ background:#3a3a3a; }

  .label{
    width:115mm; height:40mm; background:var(--cream); border-radius:3mm; overflow:hidden;
    font-family:var(--font); color:var(--green); display:flex; flex-direction:column;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .head{ background:var(--green); color:#fff; height:7.8mm; min-height:7.8mm; display:flex; align-items:center;
    padding:0 3mm; font-weight:800; font-size:4.4mm; letter-spacing:.2px; text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .body{ flex:1; min-height:0; display:flex; padding:1mm 2mm 1.2mm 2mm; gap:2mm; }

  /* Izquierda: precio pieza */
  .left{ width:54mm; display:flex; flex-direction:column; }
  .meta{ display:flex; align-items:baseline; gap:1.6mm; font-weight:800; font-size:4mm; margin-bottom:1mm; }
  .meta .sep{ color:var(--green); opacity:.5; }
  .red{ color:var(--red); font-weight:800; }

  .pricebox{ flex:1; position:relative; background:var(--yellow); border-radius:2.4mm; display:flex;
    align-items:center; justify-content:center; padding:1.5mm 1.5mm 6mm; overflow:hidden; }
  .pricebox::before{ content:""; position:absolute; inset:1mm 1mm 6mm 1mm; border:.28mm dashed var(--green);
    border-bottom:0; border-radius:1.8mm 1.8mm 0 0; pointer-events:none; }
  .sprout{ position:absolute; top:1mm; left:2mm; width:5.4mm; height:5.4mm; }
  .price{ font-family:var(--font-num); font-weight:400; font-size:16mm; line-height:.82; transform:scaleX(1.1); transform-origin:center; }
  .price .cur{ font-size:.5em; vertical-align:.6em; margin-right:.3mm; }
  .price .dot{ font-size:.78em; }
  .pieza{ position:absolute; left:0; right:0; bottom:0; background:var(--green); color:#fff; height:5.2mm;
    display:flex; align-items:center; justify-content:center; gap:1.6mm; font-weight:800; font-size:3.2mm; white-space:nowrap; border-radius:0 0 2mm 2mm; }
  .pieza::before,.pieza::after{ content:""; width:7mm; height:.9mm; flex:none;
    background:repeating-linear-gradient(90deg, var(--yellow) 0 2.8mm, transparent 2.8mm 4.6mm); }

  /* Derecha: tiers (sin iconos, letra grande) */
  .right{ width:55mm; min-height:0; display:flex; flex-direction:column; }
  /* Los tiers se centran como grupo → 1 o 4 renglones siempre lucen balanceados (no flotan arriba). */
  .tiers{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; gap:1.2mm; }
  .tier{ position:relative; display:grid; grid-template-columns:1fr auto; align-items:center;
    column-gap:2mm; padding:.6mm 0; min-height:0; }
  .tier::before{ content:""; position:absolute; top:0; left:0; right:0; height:.28mm;
    background:repeating-linear-gradient(90deg, var(--green) 0 .32mm, transparent .32mm .6mm); }
  .tier:first-child::before{ display:none; }
  .tier .txt{ font-family:var(--font-cond); font-size:3mm; font-weight:400; line-height:1; letter-spacing:.3px; }
  /* Celda de precio: ancho fijo → todos los precios arrancan en el mismo x (orden a la izquierda). */
  .tier .pricecell{ width:20mm; display:flex; align-items:baseline; gap:1mm; }
  .tier .amt{ font-family:var(--font-cond); font-weight:400; font-size:5mm; white-space:nowrap;
    letter-spacing:.3px; font-variant-numeric:tabular-nums; }
  .tier .unit{ font-family:var(--font); font-size:1.9mm; font-weight:600; }

  .barcode{ margin-top:.3mm; display:flex; justify-content:flex-end; }
  .barcode svg{ display:block; width:85%; height:5.4mm; }

  @media screen{
    body{ display:flex; flex-direction:column; align-items:center; gap:16px; padding:32px; }
    .hint{ color:#eee; font:14px/1.5 system-ui,sans-serif; max-width:640px; text-align:center; }
    .stage{ transform:scale(2.5); transform-origin:top center; margin-bottom:230px; box-shadow:0 8px 40px rgba(0,0,0,.5); }
  }
  @media print{ html,body{ background:#fff; } .hint{ display:none; } .stage{ transform:none; box-shadow:none; } }
</style>
</head>
<body>
  <div class="hint">Preview <b>115×40 mm</b> — sin iconos · letra grande · naranja de marca en SKU y número de piezas.</div>
  <div class="stage">
  <!-- Caso 18022 GRANEL: pza $54.57 por 500g (unit_base "500") → se vende por KG.
       Hero = $54.57 × 1000/500 = $109.14 "Precio por kg". Sin tiers pieza/paquete/caja. -->
  <div class="label">
    <div class="head">CAJETA ENVINADA 25KGS CABADAS</div>
    <div class="body">
      <div class="left">
        <div class="meta"><span>Código: <span class="red">18022</span></span></div>
        <div class="pricebox">
          <svg class="sprout" viewBox="0 0 40 40" fill="hsl(141, 60%, 38%)"><path transform="translate(12,15) rotate(120)" d="M0 -11 C4.5 -5 5.5 0 4 4.5 C2.8 7.5 -2.8 7.5 -4 4.5 C-5.5 0 -4.5 -5 0 -11 Z"/><path transform="translate(22,10) rotate(150) scale(0.7)" d="M0 -11 C4.5 -5 5.5 0 4 4.5 C2.8 7.5 -2.8 7.5 -4 4.5 C-5.5 0 -4.5 -5 0 -11 Z"/></svg>
          <div class="price" id="priceEl"><span class="cur">$</span>109<span class="dot">.</span>14</div>
          <div class="pieza">Precio por kg</div>
        </div>
      </div>
      <div class="right">
        <div class="tiers">
          <div class="tier">
            <div class="txt">Precio por 500 g:</div>
            <div class="pricecell"><span class="amt">$54.57</span></div>
          </div>
        </div>
        <div class="barcode"><svg id="bc"></svg></div>
      </div>
    </div>
  </div>
  </div>
<script>
  function pickFormat(c){ if(/^\d{13}$/.test(c))return'EAN13'; if(/^\d{12}$/.test(c))return'UPC'; if(/^\d{8}$/.test(c))return'EAN8'; return'CODE128'; }
  // Espejo de fitPrice() del componente: encoge el precio grande hasta caber (offsetWidth×1.12 por el scaleX).
  function fitPrice(){ var el=document.getElementById('priceEl'); if(!el)return; var box=el.parentElement;
    var cs=getComputedStyle(box), avail=box.clientWidth-parseFloat(cs.paddingLeft||0)-parseFloat(cs.paddingRight||0);
    var size=16, g=0; el.style.fontSize=size+'mm';
    while(el.offsetWidth*1.12>avail && size>6 && g++<120){ size-=0.3; el.style.fontSize=size+'mm'; } }
  // Espejo de fitAmts(): cada monto se encoge hasta caber en su celda de 20mm.
  function fitAmts(){ document.querySelectorAll('.pricecell .amt').forEach(function(amt){ var cell=amt.parentElement; var size=5,g=0; amt.style.fontSize=size+'mm';
    while(cell.scrollWidth>cell.clientWidth && size>3 && g++<40){ size-=0.2; amt.style.fontSize=size+'mm'; } }); }
  window.addEventListener('load', function () {
    try {
      var code='018804701641', el=document.getElementById('bc');
      JsBarcode(el, code, { format:pickFormat(code), displayValue:false, margin:0, width:2, height:66 });
      var w=el.getAttribute('width'), h=el.getAttribute('height');
      if(w&&h){ el.setAttribute('viewBox','0 0 '+w+' '+h); el.setAttribute('preserveAspectRatio','none'); el.removeAttribute('width'); el.removeAttribute('height'); }
    } catch(e){ console.error(e); }
    (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve()).then(function(){ fitPrice(); fitAmts(); });
  });
</script>
</body>
</html>
